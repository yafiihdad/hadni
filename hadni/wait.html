<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Protest+Riot&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- ✨ AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <title>dr.hadni</title>
  </head>
  <body>
    <main class="container">
      
      <!-- 🎧 AUDIO -->
      <audio id="bgm" loop>
        <source src="audio.mp3" type="audio/mpeg">
      </audio>

      <!-- 🖼️ IMAGE -->
      <img data-aos="fade-up" class="cat-img" src="img/wait.jpeg" alt="Picture of a cat" />

      <!-- 📝 TEXT -->
      <p data-aos="fade-up" data-aos-delay="200" class="title">
        What are you waiting for....
      </p>  
       
      <!-- 🔘 BUTTON -->
      <div data-aos="fade-up" data-aos-delay="400" class="buttons">
        <a href="tembak.html">
          <button type="button" class="btn btn--yes">next</button>
        </a>
      </div>

    </main>

    <script src="script.js" defer></script>

    <!-- ✨ AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true
      });
    </script>
  </body>
</html>
